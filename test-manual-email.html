<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Email Test Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        h1 {
            color: #667eea;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-right: 10px;
        }
        button:hover {
            background: #764ba2;
        }
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            display: none;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        pre {
            background: #f4f4f4;
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📧 Email Notification Test Dashboard</h1>
        
        <div class="form-group">
            <label>Admin Token (Get this after logging in as admin):</label>
            <input type="text" id="adminToken" placeholder="Bearer token from admin login">
        </div>

        <div class="form-group">
            <label>Test Email Address:</label>
            <input type="email" id="testEmail" placeholder="your-email@gmail.com">
        </div>

        <hr style="margin: 30px 0;">

        <h2>Test Email Configuration</h2>
        <button onclick="testEmailConfig()">🧪 Test Email Setup</button>

        <hr style="margin: 30px 0;">

        <h2>Test Approval Email</h2>
        <div class="form-group">
            <label>Student Name:</label>
            <input type="text" id="studentName" value="Test Student">
        </div>
        <div class="form-group">
            <label>Achievement Title:</label>
            <input type="text" id="achievementTitle" value="Test Achievement">
        </div>
        <div class="form-group">
            <label>Points:</label>
            <input type="number" id="points" value="100">
        </div>
        <div class="form-group">
            <label>Admin Note:</label>
            <textarea id="adminNote" rows="3">Great work! Keep it up.</textarea>
        </div>
        <button onclick="sendTestApproval()">✅ Send Test Approval Email</button>

        <div id="status" class="status"></div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';

        function showStatus(message, type = 'info') {
            const status = document.getElementById('status');
            status.className = 'status ' + type;
            status.style.display = 'block';
            status.innerHTML = message;
        }

        async function testEmailConfig() {
            const token = document.getElementById('adminToken').value;
            const testEmail = document.getElementById('testEmail').value;

            if (!token) {
                showStatus('Please enter admin token first!', 'error');
                return;
            }

            showStatus('Testing email configuration...', 'info');

            try {
                const response = await fetch(`${API_URL}/admin/test-email`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': token.startsWith('Bearer') ? token : `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        testEmail: testEmail || undefined
                    })
                });

                const data = await response.json();
                
                if (response.ok && data.success) {
                    showStatus(`
                        <strong>✅ Email Sent Successfully!</strong><br>
                        <p>Check your inbox at: ${data.sentTo}</p>
                        <p>Message ID: ${data.messageId}</p>
                        <p style="color: orange;">⚠️ Also check your spam/junk folder!</p>
                    `, 'success');
                } else {
                    showStatus(`
                        <strong>❌ Email Failed</strong><br>
                        <p>Error: ${data.error || data.message}</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `, 'error');
                }
            } catch (error) {
                showStatus(`
                    <strong>❌ Request Failed</strong><br>
                    <p>${error.message}</p>
                `, 'error');
            }
        }

        async function sendTestApproval() {
            showStatus('This would send a test approval email. Use the Test Email Setup button above first.', 'info');
        }

        // Auto-load token if saved
        const savedToken = localStorage.getItem('adminToken');
        if (savedToken) {
            document.getElementById('adminToken').value = savedToken;
        }

        // Save token on input
        document.getElementById('adminToken').addEventListener('input', (e) => {
            localStorage.setItem('adminToken', e.target.value);
        });
    </script>
</body>
</html>
