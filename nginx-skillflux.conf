# Nginx configuration for deploying at /skillflux subdirectory
# Place this in /etc/nginx/sites-available/ and create a symlink to sites-enabled
# Or include it in your main nginx config

server {
    listen 80;
    server_name your-domain.com;  # Replace with your actual domain or IP

    # Root directory for the main site
    root /var/www/html;
    index index.html;

    # Frontend - React app at /skillflux
    location /skillflux {
        alias /path/to/erp_server_deploy/frontend/skillflux/dist;  # Replace with actual path
        try_files $uri $uri/ /skillflux/index.html;
        
        # Enable gzip compression
        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    }

    # Backend API - proxy to Node.js server at /skillflux/api
    location /skillflux/api {
        proxy_pass http://localhost:5000/api;  # Adjust port if your backend runs on different port
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Backend uploads/files at /skillflux/uploads
    location /skillflux/uploads {
        proxy_pass http://localhost:5000/uploads;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
